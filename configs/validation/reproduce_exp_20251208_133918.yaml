# Validation Config: Reproduce exp_20251208_133918 (Best Delta Performance)
# December Results: R² Delta: 0.881, R² Omega: 0.557, RMSE Delta: 0.338 rad
# Target: Within ±5% of December values

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H: [1.5, 4.5]
      D: [0.5, 2.5]
      Pm: [0.4, 0.9]
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets: [-0.012, -0.008, -0.004, 0.004, 0.008, 0.012]
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

model:
  input_method: pe_direct
  use_pe_as_input: true
  input_dim: 7
  hidden_dims: [128, 128, 64, 64]  # December: smaller network for delta
  output_dim: 2
  activation: tanh
  use_residual: true
  dropout: 0.0  # December: no dropout

training:
  epochs: 300  # December: 300 epochs
  batch_size: null
  learning_rate: 0.001
  weight_decay: 1e-5  # December: minimal regularization
  device: auto
  early_stopping_patience: 200  # December: high patience
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1

loss:
  lambda_data: 1.0
  lambda_physics: 0.5  # December: fixed lambda_p=0.5 (best from ablation)
  lambda_ic: 10.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm: [1.0, 100.0]  # December: baseline weights

evaluation:
  run_baselines: true
  metrics: [rmse, mae, r2]
