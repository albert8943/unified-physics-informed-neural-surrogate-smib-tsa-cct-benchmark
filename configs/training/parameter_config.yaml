# Configuration for Parameter Estimation PINN Training

model:
  input_dim: 2
  sequence_length: 100
  hidden_dims: [128, 128, 64]
  activation: tanh
  dropout: 0.0
  use_lstm: true

training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.00001

data:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
