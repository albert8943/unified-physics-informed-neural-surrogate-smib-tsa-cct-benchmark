# SMIB: PINN + ML with matched 7-D Pe-direct inputs (fair head-to-head on feature set).
#
# Both paths use input_method pe_direct_7:
#   [time, delta0, omega0, H, D, Pm, Pe] — no tf/tc in the network input.
# PINN physics loss still receives tf, tc from scenario data (not as NN inputs).
#
# Based on: configs/experiments/smib/smib_combine_legacy_ml_and_pinn_tune.yaml
#
# Example:
#   python scripts/run_complete_experiment.py ^
#     --config configs/experiments/smib/smib_pinn_ml_matched_pe_direct_7.yaml ^
#     --skip-data-generation --skip-data-analysis --data-dir data/processed/<your_exp> ^
#     --output-dir outputs/complete_experiments

# =============================================================================
# SHARED — reproducibility, dataset, evaluation
# =============================================================================

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      D:
      - 0.5
      - 2.5
      Pm:
      - 0.4
      - 0.9
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.012
    - -0.008
    - -0.004
    - 0.004
    - 0.008
    - 0.012
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2

# =============================================================================
# PINN — 7-D Pe input (same feature list as ML pe_direct_7)
# =============================================================================

model:
  input_method: pe_direct_7
  use_pe_as_input: true
  input_dim: 7
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  output_dim: 2
  activation: tanh
  use_residual: false
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 10
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm:
  - 20.0
  - 1.0

# =============================================================================
# ML BASELINE — same 7-D inputs / architecture width as PINN (pe_direct_7).
#
# IMPORTANT: ml_baseline.scale_to_norm is NOT the same thing as loss.scale_to_norm (PINN).
# In evaluation/baselines/ml_baselines.py train(), only scale_to_norm[1] is used as
# omega_weight on the supervised MSE (delta term is always weight 1.0). Use [1.0, 100.0]
# here to match the legacy combine recipe (exp_20260404_110455). If you copy PINN's
# [20.0, 1.0] into this block, omega_weight becomes 1.0 and training largely ignores ω.
# =============================================================================

ml_baseline:
  input_method: pe_direct_7
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  dropout: 0.0
  weight_decay: 1.0e-5
  scale_to_norm:
  - 1.0
  - 100.0
  use_fixed_target_scale: false
  early_stopping_patience: 10
  pre_fault_weight: 1.0
  lambda_steady_state: 0.0
  use_ic_over_prefault: false
  two_phase_training: false
  # Upweight rows from unstable scenarios in ML loss (see ml_baselines.prepare_data). Sweep 2–5 if needed.
  unstable_weight: 3.0
