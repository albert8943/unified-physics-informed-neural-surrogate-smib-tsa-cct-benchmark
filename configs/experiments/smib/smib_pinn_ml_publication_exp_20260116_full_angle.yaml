# SMIB: Parity dropout/WD recipe for data/preprocessed/publication/exp_20260116_163828/
# (full unwrapped δ — no 360° row filter). See docs/publication/DATASET_ROTOR_ANGLE_AND_SPLIT_GUIDE.md
#
# Differences vs smib_pinn_ml_matched_pe_direct_7_parity_dropout_wd.yaml:
#   - data.preprocessing.filter_angles: false (do not re-truncate CSVs)
#   - training.max_training_angle_degrees: large (PINN angle penalty vs huge |δ| targets)
# ML baseline matches independent val-gate ML* (ml_uw2_ow50): unstable_weight=2, ω weight 50.
#   See docs/publication/INDEPENDENT_PINN_ML_VAL_GATE_PLAN.md Phase 3.
# Full-angle pitfalls (figures look like neither model tracks ANDES; negative δ R²):
#   docs/publication/SMIB_FULL_ANGLE_CAMPAIGN_NOTES.md — default compare plots clip δ to ±360°.

# =============================================================================
# SHARED — reproducibility, dataset, evaluation
# =============================================================================

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      D:
      - 0.5
      - 2.5
      Pm:
      - 0.4
      - 0.9
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.012
    - -0.008
    - -0.004
    - 0.004
    - 0.008
    - 0.012
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: false
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2

# =============================================================================
# PINN — 7-D Pe input
# =============================================================================

model:
  input_method: pe_direct_7
  use_pe_as_input: true
  input_dim: 7
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  output_dim: 2
  activation: tanh
  use_residual: false
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 10
  max_training_angle_degrees: 50000.0
  lambda_angle: 0.1
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm:
  - 20.0
  - 1.0

# =============================================================================
# ML BASELINE — matched dropout / weight_decay to PINN; ML* val-gate (uw2 / ow50)
# =============================================================================

ml_baseline:
  input_method: pe_direct_7
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  dropout: 0.1
  weight_decay: 5.0e-5
  scale_to_norm:
  - 1.0
  - 50.0
  use_fixed_target_scale: false
  early_stopping_patience: 10
  pre_fault_weight: 1.0
  lambda_steady_state: 0.0
  use_ic_over_prefault: false
  two_phase_training: false
  unstable_weight: 2.0
