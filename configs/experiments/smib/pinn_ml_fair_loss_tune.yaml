# SMIB: publication-aligned PINN + ML baseline both use pe_direct (9-D); same input space as smib_delta20_omega40.
#
# Layout in this file:
#   1) Common     — seed, data pipeline, evaluation metrics (both models)
#   2) PINN + shared — MLP definition (ML inherits width/dropout when not overridden),
#                      training budget, loss (lambda_physics is PINN-only in code)
#   3) ML only    — ml_baseline: row-weighting / IC / early-stop for the supervised baseline
#
# PINN parity vs publication:
#   python scripts/verify_pinn_sections_match.py ^
#     configs/publication/smib_delta20_omega40.yaml ^
#     configs/experiments/smib/pinn_ml_fair_loss_tune.yaml
#
# ML baseline: publication @ 6dfc344 loss knobs; input_method pe_direct so tf/tc are in the batch and
# pre_fault_weight / lambda_steady_state / use_ic_over_prefault use physical prefault masking (trainer).
# (A prior pe_direct_7 run, e.g. exp_20260402_033126, had low val loss but poor test generalization;
# 7-D disables those prefault paths in the current trainer.)
#
# Example (reuse processed data):
#   python scripts/run_complete_experiment.py ^
#     --config configs/experiments/smib/pinn_ml_fair_loss_tune.yaml ^
#     --skip-data-generation --skip-data-analysis --data-dir data/processed/<your_exp> ^
#     --output-dir outputs/complete_experiments

# =============================================================================
# COMMON — reproducibility, dataset, and evaluation (PINN and ML)
# =============================================================================

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      D:
      - 0.5
      - 2.5
      Pm:
      - 0.4
      - 0.9
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.012
    - -0.008
    - -0.004
    - 0.004
    - 0.008
    - 0.012
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2

# =============================================================================
# PINN + SHARED — network, optimization budget, loss weights
#
# model: PINN architecture; ML standard_nn inherits hidden_dims / dropout / activation unless
#        ml_baseline overrides them (this config does not override — fair capacity match).
# loss:  lambda_ic, scale_to_norm, lambda_steady_state (top-level) used by PINN; ML trainer reads
#        lambda_ic and scale_to_norm from loss; lambda_physics applies only to PINN in code.
# training: early_stopping_patience — PINN; ml_baseline_early_stopping_patience — ML fallback if
#           ml_baseline.early_stopping_patience is unset (else ML uses ml_baseline value; match PINN
#           by using the same number as training.early_stopping_patience).
# =============================================================================

model:
  input_method: pe_direct
  use_pe_as_input: true
  input_dim: 9
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  output_dim: 2
  activation: tanh
  use_residual: false
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 100
  ml_baseline_early_stopping_patience: 60
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm:
  - 20.0
  - 1.0

# =============================================================================
# ML BASELINE ONLY — supervised MLP on the same data as PINN
#
# Main structural difference vs PINN: the ML trainer never adds the physics (e.g. swing)
# loss — lambda_physics in loss: is PINN-only in code.
#
# Keys below do NOT re-introduce physics. They only shape plain supervised learning:
# sample weights, extra MSE penalties on (delta0, omega0), matching PINN target scaling,
# and when to early-stop. Both models still share loss.lambda_ic, loss.scale_to_norm, etc.,
# where the ML path reads them.
#
# Reference (all are optional training design; default in code applies if a key is omitted):
#
#   Variable                 | Meaning (no physics)
#   -------------------------+--------------------------------------------------
#   pre_fault_weight         | Loss multiplier on rows with t < tf; >1 stresses pre-fault fit.
#   lambda_steady_state      | Weight on aux MSE: on pre-fault rows, pull pred toward (delta0, omega0).
#                            | PINN uses loss.lambda_steady_state for its own objective; this is the
#                            | ML-only steady-state term inside the baseline trainer.
#   use_ic_over_prefault     | If true, IC-style error (pred vs delta0, omega0) over all pre-fault
#                            | timesteps, not only at the first time in the batch.
#   use_fixed_target_scale   | If true, targets use loss.scale_to_norm like PINN (fair numeric space).
#   unstable_weight          | Extra per-row multiplier for unstable scenarios (hard-case emphasis).
#   early_stopping_patience  | ML val early-stop patience; if set, overrides the fallback chain that
#                            | would use training.ml_baseline_early_stopping_patience (60) before
#                            | training.early_stopping_patience. Match PINN (e.g. 100) for fair runs;
#                            | very low values (e.g. 10) stop on noisy val loss before post-fault fits.
#   two_phase_training       | If true (with phase1_epochs > 0), phase 1 uses only pre-fault rows in
#                            | data MSE; omitted here → false (single-phase). Optional curriculum.
#
# Omit hidden_dims / dropout / weight_decay under ml_baseline → ML inherits PINN model + training WD/LR.
# =============================================================================

# input_method: explicit pe_direct (same as model.input_method); omit to inherit from model.
ml_baseline:
  input_method: pe_direct
  pre_fault_weight: 3.0
  lambda_steady_state: 2.0
  use_ic_over_prefault: true
  two_phase_training: false
  use_fixed_target_scale: true
  unstable_weight: 1.0
  early_stopping_patience: 100
