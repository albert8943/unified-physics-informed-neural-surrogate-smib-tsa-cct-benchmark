# Restored for publication/Colab repro (git commit dff952f3c8d157b4ccf2e4142701235ef37a328d).
# Use: --config configs/legacy/smib_best_ml_baseline.yaml
#
# Best ML baseline recipe (paper exp_20260211_190610)
#
# PINN: same publication setup as smib_delta20_omega40 (9-D pe_direct, architecture below).
# ML baseline: legacy "strong ML" settings: 7-D input (no tf/tc in features), larger net,
# dropout 0, weight_decay 1e-5, loss scale [1, 100] (omega weighted heavily), no fixed PINN
# target scale. This is NOT the strict fair-comparison recipe; use smib_delta20_omega40 for that.
# Same SMIB experiment with matched 9-D input + MLP/dropout/WD/loss scale as PINN:
#   configs/experiments/smib_best_ml_baseline_matched.yaml
#
# Documented in:
#   - paper_writing/Final_Experiment_Results_for_Paper/exp_20260211_190610/EXPERIMENT_REMARKS_*.md
#   - docs/06_publication/SMIB_JOURNAL_EXPERIMENT_AND_FIGURES.md
#   - docs/03_training/ML_BASELINE_CROSSCHECK_AND_IMPROVEMENTS.md (Sec 5.1)
#
# Reproduce (same processed data dir as your PINN run):
#   python scripts/run_complete_experiment.py \
#     --config configs/legacy/smib_best_ml_baseline.yaml \
#     --skip-data-generation --skip-data-analysis \
#     --data-dir data/processed/exp_YYYYMMDD_HHMMSS \
#     --output-dir outputs/complete_experiments

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      D:
      - 0.5
      - 2.5
      Pm:
      - 0.4
      - 0.9
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.012
    - -0.008
    - -0.004
    - 0.004
    - 0.008
    - 0.012
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

model:
  input_method: pe_direct
  use_pe_as_input: true
  input_dim: 9
  hidden_dims:
  - 256
  - 256
  - 128
  - 64
  output_dim: 2
  activation: tanh
  use_residual: true
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 100
  ml_baseline_early_stopping_patience: 200
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm:
  - 20.0
  - 1.0

ml_baseline:
  input_method: pe_direct_7
  hidden_dims:
  - 256
  - 256
  - 128
  - 128
  dropout: 0.0
  weight_decay: 1.0e-5
  scale_to_norm:
  - 1.0
  - 100.0
  use_fixed_target_scale: false
  early_stopping_patience: 200
  pre_fault_weight: 1.0
  lambda_steady_state: 0.0
  use_ic_over_prefault: false
  two_phase_training: false
  unstable_weight: 1.0

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2
