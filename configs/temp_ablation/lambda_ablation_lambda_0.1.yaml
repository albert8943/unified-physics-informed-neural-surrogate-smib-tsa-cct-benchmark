reproducibility:
  random_seed: 42
data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      - 2
      D:
      - 0.5
      - 2.5
      - 2
      Pm:
      - 0.4
      - 0.9
      - 2
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 5
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.004
    - -0.002
    - 0.0
    - 0.002
    - 0.004
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: is_stable
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0
model:
  input_method: pe_direct
  input_dim: 7
  hidden_dims:
  - 128
  - 128
  - 64
  - 64
  output_dim: 2
  activation: tanh
  use_residual: true
  dropout: 0.0
training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 1e-5
  device: auto
  early_stopping_patience: 50
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
loss:
  lambda_data: 1.0
  lambda_physics: 0.1
  lambda_ic: 10.0
  use_fixed_lambda: true
evaluation:
  run_baselines: false
  metrics:
  - rmse
  - mae
  - r2
