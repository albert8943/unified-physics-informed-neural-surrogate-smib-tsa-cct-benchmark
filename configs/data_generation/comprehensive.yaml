# Comprehensive Test Data Generation Configuration
# Large dataset for thorough testing (~10 hours)
# Generates 200 unique parameter combinations × 5 samples = 1000 total trajectories
# Matches Colab notebook "comprehensive" mode behavior

# System Configuration
system:
  case_file: "smib/SMIB.json"
  generator_model: "GENCLS"
  base_mva: 100.0

# Input method selection
input_method:
  use_pe_as_input: false

# Parameter ranges (Sobol will sample from these ranges)
parameter_ranges:
  # NEW: Unified alpha multiplier (recommended - works for SMIB and multimachine)
  # Alpha scales all loads uniformly: P' = alpha × P_base, Q' = alpha × Q_base
  # Maintains power factor (industrial standard for TSA)
  # Range: 0.4-1.2 (40%-120% of base load)
  # Light loading: 0.4-0.7 (more stable)
  # Normal loading: 0.7-1.0 (typical operating range)
  # Heavy loading: 1.0-1.2 (closer to stability limits)
  # Values > 1.2 may cause instability even without faults
  # Typical bounds: 0.3-1.3 (warns if outside)
  alpha: [0.4, 1.2]  # Range: 0.4 to 1.2 (40% to 120% of base load)
  # DEPRECATED: load, use_load_variation (kept for backward compatibility)
  load: [0.4, 0.9]        # DEPRECATED: Use alpha instead
  load_q: null  # DEPRECATED: Q is now scaled by same alpha (maintains power factor)
  use_load_variation: true  # DEPRECATED: alpha_range implies load variation
  # OLD: Pm variation (alternative approach - commented out)
  # Pm: [0.4, 0.9]        # Range: min to max (Sobol samples from this range)
  
  # Inertia constant M (M = 2×H for 60 Hz systems)
  # Range: 3.0-9.0 corresponds to H = 1.5-4.5 s
  # Small generators (gas turbines): M = 4.0-8.0 (H = 2.0-4.0 s)
  # Medium generators (steam): M = 8.0-14.0 (H = 4.0-7.0 s)
  # Large generators (hydro, large steam): M = 14.0-20.0 (H = 7.0-10.0 s)
  # Typical bounds: M = 3.0-24.0 (H = 1.5-12.0 s) (warns if outside)
  M: [3.0, 9.0]         # Range: min to max (M = 2H, so H = M/2)
  
  # Damping coefficient D (pu)
  # Range: 0.5-2.5 pu covers low to medium-high damping
  # Low damping: 0.5-1.0 pu (more oscillatory)
  # Medium damping: 1.0-2.0 pu (typical)
  # High damping: 2.0-3.0 pu (well-damped, faster settling)
  # Typical bounds: 0.3-4.0 pu (warns if outside)
  D: [0.5, 2.5]         # Range: min to max
  
  # Base load for alpha scaling (if using alpha_range)
  # base_load:
  #   Pload: 0.5  # Base active power load (pu)
  #   Qload: 0.2  # Base reactive power load (pu)

# Sampling Strategy
sampling:
  strategy: "sobol"  # Recommended for trajectory + CCT prediction
  max_correlation: 0.3
  n_samples: 200  # 200 unique parameter combinations (matches Colab comprehensive mode)
  task: "trajectory"
  n_samples_per_combination: 5  # 5 trajectories per combination (different clearing times)
  # Manual offsets (in seconds, relative to CCT). Set to null for auto-generation.
  # Default pattern: [-0.004, -0.002, 0.0, 0.002, 0.004] (3 stable, 2 unstable)
  # CCT is maximum stable time, so: offset <= 0 = stable, offset > 0 = unstable
  # Negative values = before CCT (stable), Zero = at CCT (stable), Positive = after CCT (unstable)
  additional_clearing_time_offsets: [-0.004, -0.002, 0.0, 0.002, 0.004]  # Default pattern
  clearing_times: null
  use_cct_based_sampling: true

# Fault Parameters
fault:
  start_time: 1.0
  bus: 3
  reactance: 0.0001
  type: "3phase"

# Simulation Parameters
simulation:
  time: 5.0
  time_step: 0.002  # 2 ms (matches Colab notebook)
  tolerance: 1e-4

# CCT Finding
cct_finding:
  tolerance_initial: 0.01
  tolerance_final: 0.001
  max_iterations: 50
  uncertainty_samples: 10
  use_eac_validation: true

# Data Quality Thresholds
data_quality:
  min_completeness: 0.95
  max_correlation: 0.3
  stability_balance_range: [0.4, 0.6]
  real_time_tracking: true
  early_stopping: false

# Parallel Processing
parallel:
  enabled: false
  n_jobs: 4
  batch_size: 10

# Checkpointing
checkpointing:
  enabled: true
  frequency: 1
  checkpoint_dir: "checkpoints"

# Data Export
export:
  formats: ["hdf5", "csv"]
  include_metadata: true
  data_version: "1.0.0"
  schema_validation: true

# Error Handling
error_handling:
  retry_failed: true
  max_retries: 2
  retry_time_step_reduction: 0.5
  log_errors: true
  error_log_file: "error_log.txt"

# Multi-Machine Configuration
multimachine:
  enabled: false

