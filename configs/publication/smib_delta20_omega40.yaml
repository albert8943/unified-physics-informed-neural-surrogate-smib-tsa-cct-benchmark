# Publication Configuration for SMIB Case
# Focus on rotor trajectory (delta); equal delta/omega scaling (no extra omega weight)

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    case_file: smib/SMIB.json
    use_pe_as_input: true
    parameter_ranges:
      H:
      - 1.5
      - 4.5
      D:
      - 0.5
      - 2.5
      Pm:
      - 0.4
      - 0.9
    sampling_strategy: sobol
    n_samples: 30
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:
    - -0.012
    - -0.008
    - -0.004
    - 0.004
    - 0.008
    - 0.012
    fault:
      start_time: 1.0
      bus: 3
      reactance: 0.0001
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    filter_angles: true
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

model:
  input_method: pe_direct
  use_pe_as_input: true
  # pe_direct uses 9 dims: t, delta0, omega0, H, D, Pm, Pe, tf, tc
  input_dim: 9
  hidden_dims:
  - 256
  - 256
  - 128
  - 64
  output_dim: 2
  activation: tanh
  use_residual: true
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 100
  # ML baseline: higher patience so it can train longer (improves delta, esp. unstable)
  ml_baseline_early_stopping_patience: 60
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
  # Disable periodic checkpoints to save disk space (only save best_model)
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  # Enforce (delta, omega) = (delta0, omega0) for all t < tf (improves pre-fault steady state)
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  # Rotor-trajectory focus: delta scale 20, omega weight 1 (loss dominated by delta)
  scale_to_norm:
  - 20.0
  - 1.0

# ML baseline — fair comparison with PINN:
#   Same: data (train/val/test), input_method (pe_direct 9-D), hidden_dims (256,256,128,64),
#         learning_rate, weight_decay, epochs (300), scale_to_norm [20,1] for loss, lambda_ic, seed.
#   ML-only (no physics): pre_fault_weight, lambda_steady_state, use_ic_over_prefault, unstable_weight.
#   use_fixed_target_scale: true = same target scaling as PINN (strictest fairness).
ml_baseline:
  pre_fault_weight: 3.0       # weight prefault rows so ML stays near (delta0, omega0) for t < tf
  lambda_steady_state: 2.0    # aux loss: pred vs (delta0, omega0) on prefault rows
  use_ic_over_prefault: true
  two_phase_training: false
  use_fixed_target_scale: true   # same target scale as PINN for fair comparison
  unstable_weight: 4.0
  early_stopping_patience: 100  # same as PINN for fair comparison

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2
