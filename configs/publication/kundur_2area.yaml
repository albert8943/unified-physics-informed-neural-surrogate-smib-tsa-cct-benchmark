# Publication Configuration for Kundur 2-Area (4-Machine) Case
# Single config for: (1) data generation, (2) publication trajectory figures (alpha range, fault),
# (3) ML baseline and PINN model/training (model, training, loss, evaluation).
#
# Use with multimachine data generation and MultimachinePINN training.
# For full pipeline: use train_multimachine_pe_input.py or extend run_complete_experiment
# to support data.generation.num_machines and multimachine model path.
#
# IMPORTANT: Data generation requires GENCLS (classical) generators. Use ANDES
# GENCLS Kundur: kundur.raw + kundur_gencls.dyr (see KUNDUR_EXPERIMENT_PLAN.md).
#
# Operating points: For multimachine studies the recommended approach is LOAD VARIATION
# (vary load levels; Pm is then fixed by power flow). Use alpha_range below and omit
# or remove Pm from parameter_ranges. For interim/Pm-sweep mode, keep Pm in parameter_ranges
# and do not set alpha_range (see KUNDUR_EXPERIMENT_PLAN.md 4.3.1).
#
# Publication trajectory figures (generate_stable_unstable_figures.py --config this file):
#   alpha_range and data.generation.fault are used. Set alpha_range to [min, max, n]
#   to vary load; use --alpha <value> or --all-alphas to generate figures at one or all alphas.

reproducibility:
  random_seed: 42

data:
  task: trajectory
  generation:
    # Workflow (strict, no fallback): (1) PF; if not converged reject. (2) Bisection → CCT;
    #   if CCT not found skip this operating point (no data). (3) Clearing times = CCT ± offsets only;
    #   (4) TDS + 3ph fault at fault.bus for each tc; (5) save for ML/PINN.
    #   If alpha_range set, repeat for each operating point.
    # ANDES GENCLS Kundur: raw (power flow) + dyr (4 GENCLS machines)
    case_file: kundur/kundur.raw
    addfile: kundur/kundur_gencls.dyr
    num_machines: 4
    use_pe_as_input: true
    # H and D: use absolute ranges. Scaling (H_scale × case_defaults.H) is not used here because
    # Kundur dyr has D = 0 — scaling zero gives no variation. Load (alpha) is fine to scale: base load ≠ 0.
    # Strategy: vary H and D via parameter_ranges [min, max, n]; omit H_scale_range/D_scale_range.
    # The single H and D from the sweep are applied to ALL 4 generators (uniform H and D per scenario).
    case_defaults:
      # H, D here only for reference; variation uses parameter_ranges below (absolute values).
      H: 12.5  # dyr: [13, 13, 12.35, 12.35] s
      D: 0     # dyr: 0 per machine
      # Pm: read from case by default. Add Pm only to override.
    # Leave unset to use parameter_ranges (absolute). Set only if you want scale-based variation (D base must ≠ 0).
    # H_scale_range: [0.8, 1.2, 5]
    # D_scale_range: [0.8, 1.2, 5]
    parameter_ranges:
      # H (s): standard practice 2–10 s for conventional sync generators; up to ~15 s for large units (Kundur ~12–13 s).
      H: [2.0, 15.0, 5]
      # D (pu): classical model often D=0; for studies with damping, typical range 0–2.5 pu (IEEE/stability practice).
      D: [0.0, 2.5, 5]
    # Multimachine focus variables: H, D, alpha. Pm is NOT swept; when Pload (alpha) changes, Pm follows from PF.
    # Load variation: scale all PQ loads by alpha. [0.8, 1.2, 5] = ±20% load, 5 levels (good for publication).
    alpha_range: [0.8, 1.2, 5]   # n=1 → default load level from case (alpha=1.0, no scaling)
    #alpha_range: [1.0, 1.0, 1]   # single load level (base case)
    # Default load: when omitted, read from case (kundur.raw PQ buses; pipeline uses ss.PQ.p0 from loaded case).
    base_load: { Pload: 0.5, Qload: 0.2 }  # optional override; omit to use case default (P,Q from .raw)
    # Sobol: space-filling over (H, D, alpha); ~70 op points × 6 clearing times ≈ 420 scenarios (publication-ready).
    # full_factorial with 5×5×5 = 125 op points gives 750 scenarios (use if you need maximum coverage).
    sampling_strategy: sobol
    n_samples: 70
    # Per operating point: 6 clearing times = 3 stable (tc < CCT) + 3 unstable (tc > CCT). Offsets in seconds from CCT.
    n_samples_per_combination: 6
    use_cct_based_sampling: true
    additional_clearing_time_offsets:   # negative = stable (clear before CCT), positive = unstable (clear after CCT)
    - -0.012   # stable
    - -0.008   # stable
    - -0.004   # stable
    - 0.004    # unstable
    - 0.008    # unstable
    - 0.012    # unstable
    # Set skip_fault: false to generate fault trajectory data (needed for TSA/PINN training)
    skip_fault: false
    fault:
      start_time: 1.0
      bus: 7
      reactance: 0.0001
    # With use_cct_based_sampling: true, clearing times = CCT ± offsets only (no fallback).
    # fault_clearing_times is only used when use_cct_based_sampling is false (fixed clearing times).
    fault_clearing_times: [1.01, 1.02, 1.05, 1.08, 1.10, 1.12, 1.15, 1.20]
    simulation_time: 5.0
    time_step: 0.002
  validation:
    physics_validation: true
    strict_validation: false
  preprocessing:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: scenario_id
    stratify_by_stability: true
    filter_angles: false   # disabled to keep full 5 s trajectories (angle filtering code commented out in preprocessing.py)
    max_angle_deg: 360.0
    stability_threshold_deg: 180.0

model:
  multimachine: true
  num_machines: 4
  input_method: pe_direct
  use_pe_as_input: true
  # Per-machine input: t, delta0, omega0, H, D, Pm_i, Pe_i(t), tf, tc -> 9 dims per machine (same as SMIB)
  input_dim_per_machine: 9
  hidden_dims:
  - 128
  - 128
  - 128
  - 64
  use_coi: true
  output_dim: 2
  activation: tanh
  use_residual: true
  dropout: 0.1

training:
  epochs: 300
  batch_size: null
  learning_rate: 0.001
  weight_decay: 5e-5
  device: auto
  early_stopping_patience: 100
  ml_baseline_early_stopping_patience: 30
  max_training_angle_degrees: 360.0
  lambda_angle: 0.1
  checkpoint_interval: null
  save_best_only: true

loss:
  lambda_data: 1.0
  lambda_physics: 0.5
  lambda_ic: 10.0
  lambda_steady_state: 2.0
  use_fixed_lambda: true
  use_normalized_loss: true
  scale_to_norm:
  - 20.0
  - 40.0

ml_baseline:
  pre_fault_weight: 6.0
  lambda_steady_state: 4.0
  use_ic_over_prefault: true
  unstable_weight: 2.0
  two_phase_training: true
  phase1_epochs: 40
  use_fixed_target_scale: true

# Optional: overrides for publication trajectory figures (generate_stable_unstable_figures.py).
# If omitted, scripts use data.generation.fault and data.generation.alpha_range.
# publication_figures:
#   cct_offset: 0.02      # seconds from CCT for stable (CCT-offset) / unstable (CCT+offset)
#   sim_time: 5.0         # TDS end time (s)
#   fault:                # overrides data.generation.fault if set
#     start_time: 1.0
#     bus: 7

evaluation:
  run_baselines: true
  metrics:
  - rmse
  - mae
  - r2
